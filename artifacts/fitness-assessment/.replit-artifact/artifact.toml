kind = "web"
previewPath = "/"
title = "Fitness Assessment"
version = "1.0.0"
id = "artifacts/fitness-assessment"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21317

[services.development]
run = "pnpm --filter @workspace/fitness-assessment run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fitness-assessment", "run", "build" ]
publicDir = "artifacts/fitness-assessment/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21317"
BASE_PATH = "/"
